# Thrushcombe — local Qwen narration engine, capped & sandboxed.
#
# Coexists with your native Ollama (which keeps 11434). This one lives on 11435,
# reuses your already-downloaded qwen3:8b read-only, and releases the 8GB GPU
# ~60s after each narration batch so the two never fight over the card for long.
#
#   docker compose up -d        # start
#   docker compose logs -f      # watch
#   docker compose down         # stop & remove (fully reversible)

services:
  qwen:
    image: ollama/ollama:0.13.5          # pinned to match your native version
    container_name: thrushcombe-qwen
    ports:
      - "127.0.0.1:11435:11434"          # localhost-only; sim talks to :11435

    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_MODELS=/models            # points at the read-only bind-mount below
      - OLLAMA_KEEP_ALIVE=60s            # unload model 60s after idle -> frees GPU/RAM
      - OLLAMA_MAX_LOADED_MODELS=1       # never hold more than one model
      - OLLAMA_NUM_PARALLEL=1            # one KV-cache slot -> bounded memory, no balloon
      - OLLAMA_MAX_QUEUE=128             # backpressure instead of unbounded growth

    volumes:
      # Reuse the weights your native Ollama already downloaded. Read-only:
      # the container can serve qwen3:8b but cannot write into your system store.
      - type: bind
        source: /usr/share/ollama/.ollama/models
        target: /models
        read_only: true

    # --- GPU access (nvidia runtime is already registered on this host) ---
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    # --- hard resource caps: the "won't eat the ThinkPad / won't leak" part ---
    cpus: 12.0            # max 12 of 32 threads (only used on CPU-spill; GPU path is light)
    mem_limit: 14g        # hard RAM ceiling — covers full CPU fallback of an 8B + KV
    memswap_limit: 14g    # == mem_limit -> container gets ZERO swap (no silent bloat)
    mem_swappiness: 0
    pids_limit: 512       # runaway-process backstop

    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "ps"]
      interval: 30s
      timeout: 5s
      retries: 3
